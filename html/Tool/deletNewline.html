  <main class="tool-page">
    <section class="tool-header">
      <p><a class="back-link" href="/html/Tool/Tool-list.html">返回工具列表</a></p>
      <h1>删除换行</h1>
      <p>把带有回车、换行的文本整理为单行文本，适合处理 PDF、网页复制出来的断行内容。</p>
    </section>

    <section class="newline-tool" aria-label="删除换行工具">
      <div class="textarea-grid">
        <label for="inputText">
          输入文本
          <textarea id="inputText" rows="15" placeholder="把需要处理的文本粘贴到这里"></textarea>
        </label>

        <label for="outputText">
          输出结果
          <textarea id="outputText" rows="15" placeholder="处理后的文本会显示在这里" readonly></textarea>
        </label>
      </div>

      <div class="tool-actions">
        <button type="button" id="deleteButton">删除换行</button>
        <button type="button" id="clearButton">清空</button>
        <button type="button" id="copyButton">复制结果</button>
      </div>

      <p class="tool-status" id="toolStatus" aria-live="polite"></p>
    </section>
